point_backbone:
  size_input: 5
  input_features: ["intensity", "xyz", "radius"]
  nb_channels: 768
  nb_class: 1024 # nb_class should match the size of the vit features
  depth: 48
  dim_proj: [2, 1, 0]
  grid_shape: [[256, 256], [256, 32], [256, 32]]
  fov: [[-64, -64, -8], [64, 64, 8]]
  num_neighbors: 16
  voxel_size: 0.1
  max_points: 20000
  drop_path: 0.2
  mlp_classif: True
  gelu: True
  hidden: 2048
  checkpointing: True

image_backbone:
  images_encoder: "timm_vit_large_patch14_dinov2.lvd142m"
  feat: "x_pre_norm"
  im_size: [448, 896]
 
dataloader:
  batch_size: 8
  num_workers: 16
  num_epochs: 65

optim:
  lr: 0.002
  weight_decay: 0.03
  epoch_warmup: 1
  cooldown_start: 63
  timescale: 0.45
